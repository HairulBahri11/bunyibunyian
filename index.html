<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronos Pro - Double Voice</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0c0c16 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 2rem;
            border-radius: 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 4px;
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            margin-bottom: 10px;
            color: #00d4ff;
            text-transform: uppercase;
        }

        #display {
            font-size: clamp(4rem, 15vw, 6rem);
            font-weight: 700;
            margin: 0.5rem 0;
            background: linear-gradient(to bottom, #ffffff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
        }

        .input-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
        }

        .input-group {
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.65rem;
            margin-left: 10px;
            margin-bottom: 5px;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 15px;
            color: white;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            outline: none;
            transition: 0.4s;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-container {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 18px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .btn-start {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }

        .btn-start:active {
            transform: scale(0.95);
        }

        .btn-stop {
            background: rgba(255, 255, 255, 0.05);
            color: #ff4b2b;
            border: 1px solid rgba(255, 75, 43, 0.3);
        }

        .btn-stop:active {
            transform: scale(0.95);
        }

        .wave-container {
            display: none;
            height: 30px;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-top: 20px;
        }

        .wave {
            width: 3px;
            height: 10px;
            background: #00d4ff;
            border-radius: 10px;
            animation: wave-anim 1s infinite;
        }

        @keyframes wave-anim {

            0%,
            100% {
                height: 100%;
            }

            50% {
                height: 40%;
            }
        }

        @media (min-width: 480px) {
            .input-row {
                flex-direction: row;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Chronos Double Voice</h2>
        <div id="display">00:00</div>

        <div class="input-row">
            <div class="input-group">
                <label>MULAI DARI (MENIT)</label>
                <input type="number" id="startMin" value="0" placeholder="0">
            </div>
            <div class="input-group">
                <label>ALARM PADA (MENIT)</label>
                <input type="text" id="alarmPoints" placeholder="Cont: 1, 5, 10">
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-start" onclick="startTimer()">START</button>
            <button class="btn-stop" onclick="stopTimer()">RESET</button>
        </div>

        <div class="wave-container" id="waveBox">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <span style="font-size: 0.7rem; margin-left: 10px; color: #00d4ff;">Google Berbicara...</span>
        </div>
    </div>

    <script>
        let seconds = 0;
        let startTime = 0;
        let startSeconds = 0;
        let targetMinutes = [];
        let lastAnnouncedMinute = -1;
        let worker;

        const display = document.getElementById('display');
        const startMinInput = document.getElementById('startMin');
        const alarmInput = document.getElementById('alarmPoints');
        const waveBox = document.getElementById('waveBox');

        // Audio senyap untuk mencegah HP membekukan browser saat layar mati
        const silentAudio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==');
        silentAudio.loop = true;

        // Web Worker sebaris (inline) untuk pewaktuan yang lebih tangguh di latar belakang
        const workerCode = `
            let intervalId = null;
            self.onmessage = function(e) {
                if (e.data === 'start') {
                    if (intervalId) clearInterval(intervalId);
                    intervalId = setInterval(() => {
                        self.postMessage('tick');
                    }, 1000);
                } else if (e.data === 'stop') {
                    if (intervalId) {
                        clearInterval(intervalId);
                        intervalId = null;
                    }
                }
            };
        `;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        worker = new Worker(URL.createObjectURL(blob));

        worker.onmessage = function(e) {
            if (e.data === 'tick') {
                updateDisplay();
            }
        };

        function speak(text) {
            window.speechSynthesis.cancel(); // Bersihkan antrean suara

            // Buat kalimat untuk diulang 2 kali
            const repeatedText = `${text}. Sekali lagi. ${text}`;

            const msg = new SpeechSynthesisUtterance();
            msg.text = repeatedText;
            msg.lang = 'id-ID';
            msg.rate = 1.0;

            waveBox.style.display = 'flex';
            msg.onend = () => { waveBox.style.display = 'none'; };
            window.speechSynthesis.speak(msg);
        }

        startMinInput.addEventListener('input', () => {
            if (startTime === 0) {
                let m = parseInt(startMinInput.value) || 0;
                display.innerText = `${m.toString().padStart(2, '0')}:00`;
            }
        });

        function startTimer() {
            if (startTime > 0) return; // Mencegah double start

            // Mainkan audio senyap agar tidak tertidur
            silentAudio.play().catch(e => console.log("Audio autoplay dicegah:", e));

            let startFrom = parseInt(startMinInput.value) || 0;
            startSeconds = startFrom * 60;
            startTime = Date.now();
            lastAnnouncedMinute = startFrom; // Cegah alarm pada detik ke-0 saat baru mulai

            targetMinutes = alarmInput.value.split(',').map(num => parseInt(num.trim()));
            speak(`Timer dimulai dari menit ${startFrom}.`);

            worker.postMessage('start');
            updateDisplay(); // Langsung perbarui tampilan
        }

        function updateDisplay() {
            if (startTime === 0) return;

            // Hitung detik berdasarkan waktu jam nyata (Date.now())
            let elapsedSecs = Math.floor((Date.now() - startTime) / 1000);
            seconds = startSeconds + elapsedSecs;

            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;

            display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            // Cek alarm pada detik ke-0 (pergantian menit)
            if (secs === 0 && targetMinutes.includes(mins) && lastAnnouncedMinute !== mins) {
                lastAnnouncedMinute = mins;
                speak(`Woy! Sudah menit ke ${mins}!`);
            }
        }

        function stopTimer() {
            worker.postMessage('stop');
            silentAudio.pause();
            startTime = 0;
            
            let startFrom = parseInt(startMinInput.value) || 0;
            seconds = startFrom * 60;
            display.innerText = `${startFrom.toString().padStart(2, '0')}:00`;
            waveBox.style.display = 'none';
            window.speechSynthesis.cancel();
        }
    </script>

</body>

</html>
