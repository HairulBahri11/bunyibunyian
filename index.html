<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Voice - Mode Menit</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0c0c16 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: #00d4ff;
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 90%;
            max-width: 450px;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 5px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #00d4ff;
            text-transform: uppercase;
        }

        #display {
            font-size: 6rem;
            font-weight: 700;
            margin: 10px 0;
            background: linear-gradient(to bottom, #ffffff 30%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
        }

        .input-group {
            margin: 30px 0;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.65rem;
            margin-left: 15px;
            margin-bottom: 8px;
            opacity: 0.5;
            letter-spacing: 2px;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            color: white;
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
            transition: 0.4s;
        }

        input:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: 0.4s;
            font-size: 0.8rem;
        }

        .btn-start {
            background: #00d4ff;
            color: #000;
        }

        .btn-stop {
            background: rgba(255, 255, 255, 0.05);
            color: #ff4b2b;
            border: 1px solid rgba(255, 75, 43, 0.3);
        }

        .wave-container {
            display: none;
            height: 30px;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-top: 20px;
        }

        .wave {
            width: 4px;
            height: 10px;
            background: #00d4ff;
            border-radius: 10px;
            animation: wave-anim 1s infinite;
        }

        @keyframes wave-anim {

            0%,
            100% {
                height: 100%;
            }

            50% {
                height: 40%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Voice Timer (Mode Menit)</h2>
        <div id="display">00:00</div>

        <div class="input-group">
            <label>BUNYI PADA MENIT KE:</label>
            <input type="text" id="alarmPoints" placeholder="Contoh: 1, 5, 10">
        </div>

        <div class="btn-container">
            <button class="btn-start" onclick="startTimer()">MULAI</button>
            <button class="btn-stop" onclick="stopTimer()">RESET</button>
        </div>

        <div class="wave-container" id="waveBox">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <span style="font-size: 0.7rem; margin-left: 10px; color: #00d4ff;">Google Voice sedang berbicara...</span>
        </div>
    </div>

    <script>
        let seconds = 0;
        let timerInterval;
        const display = document.getElementById('display');
        const alarmInput = document.getElementById('alarmPoints');
        const waveBox = document.getElementById('waveBox');

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'id-ID';
            msg.rate = 1.0;

            waveBox.style.display = 'flex';
            msg.onend = () => { waveBox.style.display = 'none'; };
            window.speechSynthesis.speak(msg);
        }

        function startTimer() {
            if (timerInterval) return;

            if (alarmInput.value.trim() === "") {
                speak("Masukan menitnya dulu bos.");
                return;
            }

            const targetMinutes = alarmInput.value.split(',').map(num => parseInt(num.trim()));
            speak("Timer dimulai. Saya akan ingatkan setiap menit yang kamu minta.");

            timerInterval = setInterval(() => {
                seconds++;

                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;

                display.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                // CEK SETIAP MENIT (Detik harus 0 dan Menit ada di daftar)
                if (secs === 0 && targetMinutes.includes(mins)) {
                    speak(`Sekarang adalah ${mins} menit!`);
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            seconds = 0;
            display.innerText = "00:00";
            waveBox.style.display = 'none';
            window.speechSynthesis.cancel();
        }
    </script>

</body>

</html>
